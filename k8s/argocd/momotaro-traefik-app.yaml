apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: momotaro-traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kchenfs/TableTap.git
    targetRevision: k3smigration
    path: k8s/00-infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true